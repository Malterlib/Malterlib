name: Test macOS

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      architecture:
        required: true
        type: string
      configuration:
        required: true
        type: string
      sanitizer:
        required: false
        type: string
        default: 'None'
      display_name:
        required: true
        type: string

permissions:
  contents: read

env:
  Malterlib_UseCachedEnvironment: "false"
  Malterlib_UseUserSettings: "false"
  MalterlibRepositoryHardReset: "true"
  MalterlibPreBuildNoClean: "true"
  MalterlibPreBuildNoReBuild: "true"
  MalterlibDisableBuildSystemGeneration: "true"
  MalterlibEnableLinkTimeCodeGeneration: "false"
  MalterlibImportUpdateCache: "false"
  MalterlibBuildLogFile: "Artifacts/Build.log"
  MalterlibEnableSanitizerReleaseConfigs: "false"
  MalterlibEnablePrefTestConfig: "false"
  MalterlibEnableInternalTests: "true"
  MalterlibDebugSymbolsEnable: "false"
  MalterlibDeploySymbols: "false"
  MalterlibSupportCrashDumps: "false"
  MalterlibFlakySuites: "Malterlib/File/File/Tests;Malterlib/Process/ProcessLaunchFeatures/Run As;Malterlib/Time/Time/Time speed"
  MalterlibFlakyErrors: "Timed out waiting for user/group change to come into effect;notBefore date is after current time"
  MalterlibFileLineOnDebugBreak: "true"
  MalterlibReproducibleBuild: "true"
  MalterlibLogCategoryWidth: "60"
  MalterlibEnableBreakpad: "true"
  MalterlibConcurrency_DebugSubscriptions: "true"
  MalterlibBuildShowProgress: "false"
  RunningCI: "true"
  ASAN_OPTIONS: "detect_leaks=0"
  TSAN_OPTIONS: "second_deadlock_stack=1"
  UBSAN_OPTIONS: "halt_on_error=1"

jobs:
  build:
    name: Build
    runs-on: ${{ inputs.architecture == 'arm64' && 'macos-26' || 'macos-26-intel' }}
    timeout-minutes: 120
    env:
      BuildPlatform: ${{ inputs.platform }}
      BuildArchitecture: ${{ inputs.architecture }}
      BuildConfiguration: ${{ inputs.configuration }}
      BuildSanitizer: ${{ inputs.sanitizer }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
    - uses: actions/checkout@v6
      with:
        lfs: 'true'
        clean: false
        persist-credentials: true
    - name: Configure PR checkout
      if: github.event_name == 'pull_request'
      shell: bash
      run: |
        git checkout -B "github-pr-${{ github.event.pull_request.number }}"
        git config --global --add remote.origin.fetch '+refs/pull/*/head:refs/remotes/origin/pull/*/head'
        git config --global --add remote.origin.fetch '+refs/pull/*/merge:refs/remotes/origin/pull/*/merge'
    - name: Cache binary repositories
      uses: actions/cache/restore@v5
      with:
        path: Binaries/Malterlib/${{ inputs.platform }}/${{ inputs.architecture }}
        key: malterlib-binaries-v3-${{ runner.os }}-${{ inputs.platform }}-${{ inputs.architecture }}-${{ hashFiles(format('.github/repository-cache/MalterlibBinaries-{0}-{1}.MRepo', inputs.platform, inputs.architecture)) }}
        restore-keys: |
          malterlib-binaries-v3-${{ runner.os }}-${{ inputs.platform }}-${{ inputs.architecture }}-
    - name: Restore llvm-project
      uses: actions/cache/restore@v5
      with:
        path: External/llvm-project
        key: malterlib-llvm-project-v2-${{ hashFiles('.github/repository-cache/External-llvm-project.MRepo') }}
        restore-keys: |
          malterlib-llvm-project-v2-
        enableCrossOsArchive: true
    - name: Build
      shell: bash
      run: |
        set -e
        ./.github/workflows/Build.sh
    - uses: actions/upload-artifact@v7
      if: (failure() || success())
      with:
        name: Tests ${{ inputs.platform }} ${{ inputs.architecture }} ${{ inputs.configuration }} ${{ inputs.sanitizer }}
        path: Artifacts

  test_mac:
    name: Test ${{ matrix.display_os }}
    runs-on: ${{ matrix.os }}
    needs: [build]
    timeout-minutes: 70
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.architecture == 'arm64' && '[{"os":"macos-14","display_os":"14"},{"os":"macos-15","display_os":"15"},{"os":"macos-26","display_os":"26"}]' || '[{"os":"macos-15-intel","display_os":"15"},{"os":"macos-26-intel","display_os":"26"}]') }}
    steps:
    - uses: actions/download-artifact@v8
      # TSAN and ASAN are broken on macOS 26
      if: (!(startsWith(matrix.os, 'macos-26') && (inputs.sanitizer == 'Thread' || inputs.sanitizer == 'Address')))
      with:
        name: Tests ${{ inputs.platform }} ${{ inputs.architecture }} ${{ inputs.configuration }} ${{ inputs.sanitizer }}
        path: Artifacts
    - name: Run tests
      # TSAN and ASAN are broken on macOS 26
      if: (!(startsWith(matrix.os, 'macos-26') && (inputs.sanitizer == 'Thread' || inputs.sanitizer == 'Address')))

      shell: bash
      run: |
        if ! which gtar; then
          brew install gnu-tar --quiet
        fi
        if ! which zstd; then
          brew install zstd --quiet
        fi
        if ! which node; then
          brew install node --quiet
        fi
        if ! which npm; then
          brew install npm --quiet
        fi
        pwd
        echo Num CPU threads: `getconf _NPROCESSORS_ONLN`
        ArtifactsPath="$PWD/Artifacts/Deploy.tar.zst"
        sudo rm -rf /opt/Deploy
        sudo mkdir -p /opt/Deploy
        sudo chown $USER /opt/Deploy
        cd /opt/Deploy
        export MalterlibCrashDumpDir="$PWD/CrashDumps"
        gtar -xf "$ArtifactsPath"
        TestsDirName=`find Tests* -maxdepth 0`
        if [[ "$TestsDirName" != "Tests" ]]; then
          mv "$TestsDirName" Tests
        fi
        cd Tests
        ./RunAllTests --quiet --launch-per-suite --suite-order slow_first --timeout 3600 -- --logs
        sudo -E ./RunAllTests -g SuperUser --quiet --launch-per-suite --suite-order slow_first --timeout 3600 --no-parallel -- --logs
        exit 0
