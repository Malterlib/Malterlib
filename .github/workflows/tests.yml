name: Tests

on: [push]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  run_windows:
    strategy:
      fail-fast: false
      matrix:
        platform: [Windows]
        architecture: [x64]
        configuration: [Debug, 'Release Testing (Tests)', 'Release (Tests)']
    uses: ./.github/workflows/Test_Windows.yml
    with:
      platform: ${{ matrix.platform }}
      architecture: ${{ matrix.architecture }}
      configuration: ${{ matrix.configuration }}
    secrets: inherit
    name: Windows ${{ matrix.architecture }} ${{ matrix.configuration }}

  run_mac:
    strategy:
      fail-fast: false
      matrix:
        platform: [macOS]
        architecture: [x64]
        configuration: [Debug, 'Release Testing (Tests)', 'Release (Tests)', 'Release (TSan Tests)', 'Release (ASan Tests)', 'Release (UBSan Tests)']
    uses: ./.github/workflows/Test_macOS.yml
    with:
      platform: ${{ matrix.platform }}
      architecture: ${{ matrix.architecture }}
      configuration: ${{ matrix.configuration }}
    secrets: inherit
    name: macOS ${{ matrix.architecture }} ${{ matrix.configuration }}

  run_linux:
    strategy:
      fail-fast: false
      matrix:
        platform: [Linux]
        architecture: [x64]
        configuration: [Debug, 'Release Testing (Tests)', 'Release (Tests)', 'Release (TSan Tests)', 'Release (ASan Tests)', 'Release (UBSan Tests)']
    uses: ./.github/workflows/Test_Linux.yml
    with:
      platform: ${{ matrix.platform }}
      architecture: ${{ matrix.architecture }}
      configuration: ${{ matrix.configuration }}
    secrets: inherit
    name: Linux ${{ matrix.architecture }} ${{ matrix.configuration }}
