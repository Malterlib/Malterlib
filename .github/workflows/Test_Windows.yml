name: Test Windows

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      architecture:
        required: true
        type: string
      configuration:
        required: true
        type: string
      sanitizer:
        required: false
        type: string
        default: 'None'
      display_name:
        required: true
        type: string

permissions:
  contents: read

env:
  Malterlib_UseCachedEnvironment: "false"
  Malterlib_UseUserSettings: "false"
  MalterlibRepositoryHardReset: "true"
  MalterlibPreBuildNoClean: "true"
  MalterlibPreBuildNoReBuild: "true"
  MalterlibDisableBuildSystemGeneration: "true"
  MalterlibEnableLinkTimeCodeGeneration: "false"
  MalterlibImportUpdateCache: "false"
  MalterlibBuildLogFile: "Artifacts/Build.log"
  MalterlibEnableSanitizerReleaseConfigs: "false"
  MalterlibEnablePrefTestConfig: "false"
  MalterlibEnableInternalTests: "true"
  MalterlibDebugSymbolsEnable: "false"
  MalterlibDeploySymbols: "false"
  MalterlibSupportCrashDumps: "false"
  MalterlibFlakySuites: "Malterlib/File/File/Tests;Malterlib/Process/ProcessLaunch/*/*/KillSandbox;Malterlib/Time/Time/Time speed"
  MalterlibFlakyErrors: "Failed to replace local function with sanitizer version"
  MalterlibFileLineOnDebugBreak: "true"
  MalterlibReproducibleBuild: "true"
  MalterlibTestsMem_EnablePerfTests: "false"
  MalterlibLogCategoryWidth: "60"
  MalterlibConcurrency_DebugSubscriptions: "true"
  MalterlibBuildShowProgress: "false"
  RunningCI: "true"
  ASAN_OPTIONS: "detect_leaks=0"
  TSAN_OPTIONS: "second_deadlock_stack=1"

jobs:
  build:
    name: Build
    runs-on: ${{ inputs.architecture == 'arm64' && 'windows-11-arm' || 'windows-2025' }}
    timeout-minutes: 120
    env:
      BuildPlatform: ${{ inputs.platform }}
      BuildArchitecture: ${{ inputs.architecture }}
      BuildConfiguration: ${{ inputs.configuration }}
      BuildSanitizer: ${{ inputs.sanitizer }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
    - name: Setup git config
      run: |
        git config --global core.autocrlf false
        git config --global core.eol lf
        git config --global core.symlinks true
    - uses: actions/checkout@v6
      with:
        lfs: 'true'
        clean: false
        persist-credentials: true
    - name: Configure PR checkout
      if: github.event_name == 'pull_request'
      shell: bash
      run: |
        git checkout -B "github-pr-${{ github.event.pull_request.number }}"
        git config --global --add remote.origin.fetch '+refs/pull/*/head:refs/remotes/origin/pull/*/head'
        git config --global --add remote.origin.fetch '+refs/pull/*/merge:refs/remotes/origin/pull/*/merge'
    - name: Setup zstd cache tool
      shell: pwsh
      run: |
        if (!(Get-Command zstd -ErrorAction SilentlyContinue)) {
          choco install zstandard --version 1.5.7.20250308 --no-progress --yes
        }
    # - name: Configure Pagefile
    #   shell: pwsh
    #   run: |
    #     [System.UInt64] $MinimumSize = ($env:MinimumSize / 1kb) * 1kb
    #     if ($MinimumSize -le 0) {
    #       $MinimumSize = 8gb
    #     }
    #     [System.UInt64] $MaximumSize = ($env:MaximumSize / 1kb) * 1kb
    #     if ($MaximumSize -le 0) {
    #       $MaximumSize = $MinimumSize
    #     }
    #     [System.String] $DiskRoot = $env:DiskRoot
    #     echo "Pagefile configuration:"
    #     echo "- Minimum size: $($MinimumSize)"
    #     echo "- Maximum size: $($MaximumSize)"
    #     echo "- Disk root: $($DiskRoot)"
    #     Add-Type -Path "$env:SourcePath"
    #     [Util.PageFile]::SetPageFileSize($MinimumSize, $MaximumSize, $DiskRoot)
    #   env:
    #     MinimumSize: 16GB
    #     MaximumSize: 64GB
    #     DiskRoot: "C:"
    #     SourcePath: ${{ github.workspace }}/.github/workflows/SetPageFileSize.cs
    - name: Cache binary repositories
      uses: actions/cache/restore@v5
      with:
        path: Binaries/Malterlib/${{ inputs.platform }}/${{ inputs.architecture }}
        key: malterlib-binaries-v3-${{ runner.os }}-${{ inputs.platform }}-${{ inputs.architecture }}-${{ hashFiles(format('.github/repository-cache/MalterlibBinaries-{0}-{1}.MRepo', inputs.platform, inputs.architecture)) }}
        restore-keys: |
          malterlib-binaries-v3-${{ runner.os }}-${{ inputs.platform }}-${{ inputs.architecture }}-
    - name: Restore llvm-project
      uses: actions/cache/restore@v5
      with:
        path: External/llvm-project
        key: malterlib-llvm-project-windows-v2-${{ hashFiles('.github/repository-cache/External-llvm-project.MRepo') }}
        restore-keys: |
          malterlib-llvm-project-windows-v2-
    - name: Build
      shell: bash -leo pipefail {0}
      run: |
        set -e
        git reset --hard
        ./.github/workflows/Build.sh
    - uses: actions/upload-artifact@v7
      if: (failure() || success())
      with:
        name: Tests ${{ inputs.platform }} ${{ inputs.architecture }} ${{ inputs.configuration }} ${{ inputs.sanitizer }}
        path: |
          Artifacts
    - uses: actions/upload-artifact@v7
      if: (success() && (env.MalterlibDeploySymbols == 'true'))
      with:
        name: Symbols ${{ inputs.platform }} ${{ inputs.architecture }} ${{ inputs.configuration }} ${{ inputs.sanitizer }}
        path: |
          Symbols

  test_windows:
    name: Test ${{ matrix.display_os }}
    runs-on: ${{ matrix.os }}
    needs: [build]
    timeout-minutes: 70
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.architecture == 'arm64' && '[{"os":"windows-11-arm","display_os":"11"}]' || '[{"os":"windows-2022","display_os":"2022"},{"os":"windows-2025","display_os":"2025"}]') }}
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: Tests ${{ inputs.platform }} ${{ inputs.architecture }} ${{ inputs.configuration }} ${{ inputs.sanitizer }}
        path: Artifacts
    - name: Disk space before
      shell: bash
      run: |
        echo Workspace: '${{ github.workspace }}'
        df -h
        curl -H 'Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' -H 'Accept: application/vnd.github.v3.raw' -L -O "https://api.github.com/repos/$GITHUB_REPOSITORY/contents/.github/workflows/SetPageFileSize.cs?ref=$GITHUB_REF"
    - name: Configure Pagefile
      shell: pwsh
      run: |
        [System.UInt64] $MinimumSize = ($env:MinimumSize / 1kb) * 1kb
        if ($MinimumSize -le 0) {
          $MinimumSize = 8gb
        }
        [System.UInt64] $MaximumSize = ($env:MaximumSize / 1kb) * 1kb
        if ($MaximumSize -le 0) {
          $MaximumSize = $MinimumSize
        }
        [System.String] $DiskRoot = $env:DiskRoot
        echo "Pagefile configuration:"
        echo "- Minimum size: $($MinimumSize)"
        echo "- Maximum size: $($MaximumSize)"
        echo "- Disk root: $($DiskRoot)"
        Add-Type -Path "$env:SourcePath"
        [Util.PageFile]::SetPageFileSize($MinimumSize, $MaximumSize, $DiskRoot)
      env:
        MinimumSize: 16GB
        MaximumSize: 64GB
        DiskRoot: "C:"
        SourcePath: ${{ github.workspace }}/SetPageFileSize.cs
    - name: Disk space after
      shell: bash
      run: |
        df -h
    - name: Run tests
      shell: bash
      run: |
        set -ex
        if [[ "$MatrixOs" == "windows-2019" ]]; then
          MalterlibFlakySuites="$MalterlibFlakySuites;Malterlib/Cloud/SecretsManager/General"
        fi
        pwd
        echo Num CPU threads: `getconf _NPROCESSORS_ONLN`
        rm -rf Deploy
        mkdir -p Deploy
        cd Deploy
        export MalterlibCrashDumpDir=`cygpath -m "$PWD/CrashDumps"`
        mkdir -p "$PWD/CrashDumps"
        BsdTar="../Artifacts/bsdtar.exe"
        if [[ ! -f "$BsdTar" ]]; then
          BsdTar="tar"
        fi
        "$BsdTar" -xf ../Artifacts/Deploy.tar.zst
        cd Tests*
        ./RunAllTests --quiet --launch-per-suite --suite-order slow_first --timeout 3600 -- --logs
        exit 0
      env:
        MatrixOs: ${{ matrix.os }}

    - uses: actions/upload-artifact@v7
      if: ((failure() || success()) && (env.MalterlibSupportCrashDumps == 'true'))
      with:
        name: Crash Dumps ${{ inputs.platform }} ${{ matrix.os }} ${{ inputs.architecture }} ${{ inputs.configuration }} ${{ inputs.sanitizer }}
        path: |
          Deploy/CrashDumps/MiniDump_*
          Deploy/CrashDumps/*.txt
