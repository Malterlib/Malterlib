stages:
  - build
  - test

variables:
  GIT_STRATEGY: none
  MalterlibDeployRoot: "${CI_PROJECT_DIR}/Deploy"
  MalterlibRepositoryHardReset: "true"
  MalterlibPreBuildNoClean: "true"
  MalterlibDisableBuildSystemGeneration: "true"
  MalterlibEnableLinkTimeCodeGeneration: "false"
  MalterlibBuildLogFile: "Artifacts/Build.log"
  ASAN_OPTIONS: "detect_leaks=0"
  TSAN_OPTIONS: "second_deadlock_stack=1"
  EnablePlatform_Linux2_6: "true"
  MalterlibEnableInternalTests: "true"
  RunningCI: "true"

before_script:
  - 'set -e'
  - 'if [[ ! -d "${CI_PROJECT_DIR}/.git" ]]; then'
  - '  echo "Initializing: ${CI_PROJECT_DIR}"'
  - '  mkdir -p "${CI_PROJECT_DIR}"'
  - '  pushd "${CI_PROJECT_DIR}" > /dev/null'
  - '  git init .'
  - '  popd > /dev/null'
  - 'fi'
  - 'pushd "${CI_PROJECT_DIR}" > /dev/null'
  - 'echo "Fetching in \"${CI_PROJECT_DIR}\""'
  - 'export GIT_TERMINAL_PROMPT=0'
  - 'if ! git remote add origin "${CI_REPOSITORY_URL}" 2> /dev/null; then'
  - '  git remote set-url origin "${CI_REPOSITORY_URL}"'
  - 'fi'
  - 'git fetch origin --prune'
  - 'popd > /dev/null'
  - 'git checkout -f -B "$CI_COMMIT_REF_NAME" "$CI_COMMIT_SHA"'
  - 'git clean -fd'

Build_Linux:
  stage: build
  tags:
    - OSX
    - Build
  script:
    - set -e
    - ./mib update_repos
    - rm -rf Deploy
    - mkdir -p BuildSystem/Default
    - echo "DefaultRoot \"${MalterlibDeployRoot}\"" > BuildSystem/Default/PostCopy.MConfig
    - ./mib prebuild Malterlib Tests
    - ./mib build Tests Linux2.6 x64 Debug
    - GZIP=-1 tar -czf Artifacts/Deploy.tar.gz Deploy
  artifacts:
    when: always
    name: "Tests"
    expire_in: 1 day
    paths:
      - Artifacts/Deploy.tar.gz
      - Artifacts/Build.log

Build_Linux_ReleaseTesting:
  stage: build
  tags:
    - OSX
    - Build
  script:
    - set -e
    - ./mib update_repos
    - rm -rf Deploy
    - mkdir -p BuildSystem/Default
    - echo "DefaultRoot \"${MalterlibDeployRoot}\"" > BuildSystem/Default/PostCopy.MConfig
    - ./mib prebuild Malterlib Tests
    - ./mib build Tests Linux2.6 x64 "Release Testing (Tests)"
    - GZIP=-1 tar -czf Artifacts/Deploy_ReleaseTesting.tar.gz Deploy
  artifacts:
    when: always
    name: "Tests Release Testing"
    expire_in: 1 day
    paths:
      - Artifacts/Deploy_ReleaseTesting.tar.gz
      - Artifacts/Build.log

