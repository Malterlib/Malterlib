Test_Linux:
  stage: test
  needs: ["Build_Linux"]
  tags:
    - LinuxHighMem
  dependencies:
    - Build_Linux
  before_script:
    - echo Skipping git sync
  script:
    - set -e
    - rm -rf Deploy
    - tar -xf Artifacts/Deploy.tar.gz
    - pushd Deploy/Tests_Linux_x64
    - ./RunAllTests --no-quiet
    - popd

Test_Linux_ReleaseTesting:
  stage: test
  needs: ["Build_Linux_ReleaseTesting"]
  tags:
    - LinuxHighMem
  dependencies:
    - Build_Linux_ReleaseTesting
  before_script:
